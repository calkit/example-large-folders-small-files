stages:
  make-data:
    cmd: python make-data.py
    deps:
      - make-data.py
    outs:
      - results:
          cache: false
          persist: false
    desc: Automatically generated from the 'make-data' stage in calkit.yaml.
      Changes made here will be overwritten.
  process-input:
    cmd: bash --noprofile --norc -c "ls input > input-contents.txt"
    deps:
      - input
    outs:
      - input-contents.txt:
          cache: false
          persist: false
    desc: Automatically generated from the 'process-input' stage in calkit.yaml.
      Changes made here will be overwritten.
  process-results:
    cmd: bash --noprofile --norc -c "ls results > results-content.txt"
    deps:
      - results
    outs:
      - results-content.txt:
          cache: false
          persist: false
    desc: Automatically generated from the 'process-results' stage in calkit.yaml.
      Changes made here will be overwritten.
